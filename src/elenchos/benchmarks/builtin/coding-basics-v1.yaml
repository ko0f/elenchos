id: coding-basics-v1
version: 1
type: coding
description: >-
  Non-trivial Python algorithm and data-structure tasks (graphs, DP, parsing,
  design). Each task is self-contained, code-only, and solvable in one response.
defaults:
  params:
    temperature: 0.0
    max_tokens: 2048
tasks:
  - id: lru_cache
    description: >-
      Tests: O(1) LRU cache design using a doubly-linked list + hash map (or
      OrderedDict). Success: all five assertions pass — correct eviction order,
      correct get/put semantics, capacity enforcement.
    prompt: |
      Implement a class `LRUCache` with O(1) `get` and `put`:

        - `LRUCache(capacity)` constructs a cache holding at most `capacity`
          items.
        - `get(key)` returns the value for `key`, or `-1` if absent. A
          successful `get` marks the key as most-recently used.
        - `put(key, value)` inserts/updates the key. If the cache is over
          capacity, evict the least-recently-used key.

      Respond with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: LRUCache
        tests: |
          c = LRUCache(2)
          c.put(1, 1)
          c.put(2, 2)
          assert c.get(1) == 1
          c.put(3, 3)
          assert c.get(2) == -1
          c.put(4, 4)
          assert c.get(1) == -1
          assert c.get(3) == 3
          assert c.get(4) == 4

  - id: dijkstra
    description: >-
      Tests: Dijkstra's algorithm on a weighted directed graph. Success: correct
      shortest-path weights, zero for same start/end, -1 for unreachable nodes.
    prompt: |
      Write `shortest_path(graph, start, end)` returning the minimum total
      weight of a path from `start` to `end` in a weighted directed graph.
      `graph` maps each node to a list of `(neighbor, weight)` tuples with
      non-negative integer weights. Return `0` when `start == end`, and `-1`
      when `end` is unreachable. Respond with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: shortest_path
        tests: |
          g = {"a": [("b", 1), ("c", 4)], "b": [("c", 2), ("d", 5)], "c": [("d", 1)], "d": []}
          assert shortest_path(g, "a", "d") == 4
          assert shortest_path(g, "a", "c") == 3
          assert shortest_path(g, "a", "a") == 0
          assert shortest_path(g, "d", "a") == -1

  - id: expr_eval
    description: >-
      Tests: recursive-descent or shunting-yard expression parser — operator
      precedence, parentheses, real division, whitespace tolerance, no eval/exec.
      Success: all five numeric assertions pass.
    prompt: |
      Write `evaluate(expr)` that evaluates an arithmetic expression string and
      returns its numeric value. Support `+ - * /` with standard precedence,
      parentheses, and arbitrary whitespace. Division is real (true) division.
      Do not use `eval` or `exec`. Respond with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: evaluate
        tests: |
          assert evaluate("3 + 4 * 2") == 11
          assert evaluate("(3 + 4) * 2") == 14
          assert evaluate("10 / 2 - 3") == 2
          assert evaluate("2 * (3 + (4 - 1))") == 12
          assert evaluate("  100  ") == 100

  - id: edit_distance
    description: >-
      Tests: classic DP Levenshtein distance (insert/delete/substitute).
      Success: correct distances for all four string pairs including empty-string
      and identical-string edge cases.
    prompt: |
      Write `edit_distance(a, b)` returning the Levenshtein edit distance
      between strings `a` and `b`: the minimum number of single-character
      insertions, deletions, or substitutions to transform `a` into `b`.
      Respond with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: edit_distance
        tests: |
          assert edit_distance("kitten", "sitting") == 3
          assert edit_distance("", "abc") == 3
          assert edit_distance("abc", "abc") == 0
          assert edit_distance("flaw", "lawn") == 2

  - id: topo_sort
    description: >-
      Tests: Kahn's algorithm (or DFS) with lexicographic tie-breaking; cycle
      detection. Success: correct lex-smallest ordering for a DAG, [] for a
      cyclic graph, correct ordering when nodes have no shared prefix.
    prompt: |
      Write `topo_sort(graph)` returning the lexicographically smallest valid
      topological ordering of a directed graph as a list. `graph` maps each
      node to a list of nodes it points to (edges u -> v mean u precedes v).
      When ties occur among ready nodes, pick the smallest by normal `<`
      comparison. Return an empty list `[]` if the graph has a cycle. Respond
      with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: topo_sort
        tests: |
          assert topo_sort({"a": ["b", "c"], "b": ["d"], "c": ["d"], "d": []}) == ["a", "b", "c", "d"]
          assert topo_sort({"a": ["b"], "b": ["a"]}) == []
          assert topo_sort({"x": [], "y": [], "z": ["x", "y"]}) == ["z", "x", "y"]

  - id: merge_intervals
    description: >-
      Tests: sort-and-sweep interval merging including touching endpoints and
      contained intervals. Success: all four cases return the correct minimal
      merged list, including empty-input handling.
    prompt: |
      Write `merge_intervals(intervals)` that takes a list of `[start, end]`
      integer intervals (in any order, possibly overlapping or touching) and
      returns the minimal list of merged, non-overlapping intervals sorted by
      start. Intervals that touch at an endpoint merge. Respond with Python
      code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: merge_intervals
        tests: |
          assert merge_intervals([[1, 3], [2, 6], [8, 10], [15, 18]]) == [[1, 6], [8, 10], [15, 18]]
          assert merge_intervals([[1, 4], [4, 5]]) == [[1, 5]]
          assert merge_intervals([]) == []
          assert merge_intervals([[1, 4], [2, 3]]) == [[1, 4]]

  - id: min_window
    description: >-
      Tests: sliding-window minimum substring containing all characters of t
      with duplicate counts. Success: correct substring (or "") for all four
      cases including impossible and leftmost-tie scenarios.
    prompt: |
      Write `min_window(s, t)` returning the shortest contiguous substring of
      `s` that contains every character of `t` including duplicates (counts
      must be respected). If no such substring exists, return `""`. If multiple
      substrings have the minimum length, return the leftmost. Respond with
      Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: min_window
        tests: |
          assert min_window("ADOBECODEBANC", "ABC") == "BANC"
          assert min_window("a", "a") == "a"
          assert min_window("a", "aa") == ""
          assert min_window("aab", "ab") == "ab"

  - id: coin_change
    description: >-
      Tests: unbounded knapsack DP for minimum coin count. Success: optimal
      count for standard and hard (large-denomination) cases, 0 for amount=0,
      -1 when no solution exists.
    prompt: |
      Write `coin_change(coins, amount)` returning the minimum number of coins
      whose values sum exactly to `amount`. Each coin denomination may be used
      any number of times. Return `0` when `amount` is `0`, and `-1` when the
      amount cannot be made. Respond with Python code only.
    scoring:
      - type: unit_test
        language: python
        entrypoint: coin_change
        tests: |
          assert coin_change([1, 2, 5], 11) == 3
          assert coin_change([2], 3) == -1
          assert coin_change([1], 0) == 0
          assert coin_change([186, 419, 83, 408], 6249) == 20
